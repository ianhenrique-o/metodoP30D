<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ian Henrique | P30D</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #d1d5db;
        }

        /* Animações Customizadas */
        @keyframes scanline {
            0% { left: -100%; opacity: 0; }
            50% { opacity: 0.5; }
            100% { left: 200%; opacity: 0; }
        }
        
        .bg-grid {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }
        
        .scan-beam {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 150px;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.1), transparent);
            filter: blur(20px);
            animation: scanline 8s linear infinite;
            transform: skewX(-20deg);
            pointer-events: none;
        }
        
        .glow-text {
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        /* Estilos da nova Timeline Imersiva */
        .timeline-glass {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Componentes de Ícones ---
        const Icon = ({ path, className, size = 24, strokeWidth = "2" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth={strokeWidth} 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {path}
            </svg>
        );

        const Icons = {
            Check: (props) => <Icon {...props} path={<polyline points="20 6 9 17 4 12"></polyline>} />,
            X: (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></>} />,
            ArrowRight: (props) => <Icon {...props} path={<><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></>} />,
            ChevronDown: (props) => <Icon {...props} path={<polyline points="6 9 12 15 18 9"></polyline>} />,
            Target: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></>} />,
            PenTool: (props) => <Icon {...props} path={<><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></>} />,
            MessageSquare: (props) => <Icon {...props} path={<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>} />,
            RefreshCw: (props) => <Icon {...props} path={<><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></>} />,
            AlertTriangle: (props) => <Icon {...props} path={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></>} />,
            Users: (props) => <Icon {...props} path={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></>} />,
        };

        // --- Utilitários ---
        const RevealOnScroll = ({ children, delay = 0, className = "" }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold: 0.1 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => {
                    if (ref.current) observer.unobserve(ref.current);
                };
            }, []);

            return (
                <div
                    ref={ref}
                    className={className}
                    style={{
                        opacity: isVisible ? 1 : 0,
                        transform: isVisible ? 'translateY(0)' : 'translateY(30px)',
                        transition: `all 0.8s cubic-bezier(0.17, 0.55, 0.55, 1) ${delay}s`
                    }}
                >
                    {children}
                </div>
            );
        };

        const Button = ({ children, primary = true, className = "", ...props }) => (
            <button
                className={`
                    px-8 py-4 rounded-lg font-bold text-lg tracking-wide transition-all duration-300 transform hover:-translate-y-1 hover:shadow-lg
                    ${primary 
                        ? 'bg-blue-600 hover:bg-blue-500 text-white shadow-[0_0_20px_rgba(37,99,235,0.3)] border border-blue-500/50' 
                        : 'bg-transparent border border-white/20 text-white hover:bg-white/10'}
                    ${className}
                `}
                {...props}
            >
                {children}
            </button>
        );

        const GlassCard = ({ children, className = "" }) => (
            <div className={`relative overflow-hidden bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-8 hover:border-white/20 transition-colors duration-300 ${className}`}>
                {children}
            </div>
        );

        // --- NOVO COMPONENTE: Timeline Imersiva com Scroll-jacking ---
        const CreativeTimeline = () => {
            const containerRef = useRef(null);
            const [progress, setProgress] = useState(0);

            useEffect(() => {
                let ticking = false; // Controle para o requestAnimationFrame

                const updateProgress = () => {
                    if (!containerRef.current) {
                        ticking = false;
                        return;
                    }
                    
                    const { top, height } = containerRef.current.getBoundingClientRect();
                    const windowHeight = window.innerHeight;
                    
                    // Proteção: Se a seção ainda não chegou no topo da tela
                    if (top > 0) {
                        setProgress(0);
                        ticking = false;
                        return;
                    }
                    
                    // Altura que realmente pode ser rolada enquanto o container está sticky
                    const scrollableDistance = height - windowHeight;
                    
                    // Proteção: Se já passamos do final da seção
                    if (-top > scrollableDistance) {
                        setProgress(1);
                        ticking = false;
                        return;
                    }
                    
                    // Calculando progresso de 0 a 1
                    let currentProgress = -top / scrollableDistance;
                    setProgress(currentProgress);
                    
                    ticking = false; // Libera para o próximo cálculo
                };

                const handleScroll = () => {
                    // Só agenda um novo cálculo se o anterior já terminou (evita sobrecarga)
                    if (!ticking) {
                        window.requestAnimationFrame(updateProgress);
                        ticking = true;
                    }
                };

                window.addEventListener('scroll', handleScroll, { passive: true });
                // Chamada inicial
                handleScroll();
                
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const steps = [
                {
                    week: "Semana 1",
                    title: "A base que decide tudo",
                    desc1: "A gente trava a mensagem central do seu perfil: quem você atende, o que você resolve e qual é o caminho do cliente até a decisão.",
                    desc2: "Eu organizo o topo do seu perfil para que a pessoa entre e entenda rápido: “isso é pra mim e eu sei como começar”.",
                    colorClass: "bg-blue-500",
                    textClass: "text-blue-400",
                    glowColor: "rgba(59, 130, 246, 0.15)", // Blue
                    shadowClass: "shadow-[0_0_30px_rgba(59,130,246,0.5)]"
                },
                {
                    week: "Semana 2",
                    title: "Conteúdo com intenção",
                    desc1: "Você para de inventar post. Eu construo sua linha editorial para atrair gente certa e construir autoridade de verdade.",
                    desc2: "Você passa a postar com função: o que atrai, o que prova, o que filtra e o que chama para ação.",
                    colorClass: "bg-purple-500",
                    textClass: "text-purple-400",
                    glowColor: "rgba(168, 85, 247, 0.15)", // Purple
                    shadowClass: "shadow-[0_0_30px_rgba(168,85,247,0.5)]"
                },
                {
                    week: "Semana 3",
                    title: "O que separa perfil bom de perfil que vende",
                    desc1: "A gente arruma o que mais faz você perder tempo: condução no direct.",
                    desc2: "Você não vai mais depender de “ser bom de conversa”. Você vai ter um jeito claro de conduzir.",
                    colorClass: "bg-orange-500",
                    textClass: "text-orange-400",
                    glowColor: "rgba(249, 115, 22, 0.15)", // Orange
                    shadowClass: "shadow-[0_0_30px_rgba(249,115,22,0.5)]"
                },
                {
                    week: "Semana 4",
                    title: "Ajuste fino e consolidação",
                    desc1: "A gente corrige o que estiver travando e reforça o que estiver funcionando.",
                    desc2: "Você termina com uma base instalada e um sistema que funciona por você pelos próximos 12 meses — sem depender de ninguém.",
                    colorClass: "bg-emerald-500",
                    textClass: "text-emerald-400",
                    glowColor: "rgba(16, 185, 129, 0.15)", // Emerald
                    shadowClass: "shadow-[0_0_30px_rgba(16,185,129,0.5)]"
                }
            ];

            // Determinar qual é o card ativo baseado no progresso (dividimos por 4 etapas)
            // progress = 0 a 0.24 (Passo 0), 0.25 a 0.49 (Passo 1), etc...
            // Um leve ajuste para que a troca não seja tão abrupta
            const activeIndex = Math.min(3, Math.max(0, Math.floor(progress * 4)));
            
            // Cor do blob de fundo dependendo do card ativo
            const currentGlow = steps[activeIndex].glowColor;

            return (
                // Altura reduzida de 400vh para 250vh para um scroll mais rápido e leve
                <section ref={containerRef} className="relative w-full h-[250vh] bg-[#050505]">
                    {/* Elemento Sticky que trava na tela */}
                    <div className="sticky top-0 h-screen w-full flex flex-col justify-center overflow-hidden">
                        
                        {/* Background animado global (Glow Blob) com Aceleração de Hardware */}
                        <div 
                            className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] md:w-[800px] md:h-[800px] rounded-full blur-[100px] pointer-events-none transition-colors duration-1000 ease-in-out"
                            style={{ 
                                backgroundColor: currentGlow,
                                willChange: 'background-color',
                                transform: 'translate(-50%, -50%) translateZ(0)' // Força renderização na GPU
                            }}
                        />

                        {/* Número Gigante de Fundo */}
                        <div className="absolute inset-0 flex items-center justify-center opacity-[0.03] pointer-events-none z-0 overflow-hidden">
                            <span className="text-[40vw] font-black tracking-tighter text-white transition-all duration-700 ease-[cubic-bezier(0.16,1,0.3,1)] transform scale-110" style={{ willChange: 'contents' }}>
                                0{activeIndex + 1}
                            </span>
                        </div>

                        <div className="container mx-auto px-6 max-w-6xl relative z-10 flex flex-col md:flex-row items-center justify-center h-full gap-8 md:gap-16">
                            
                            {/* Esquerda: Header & Tracker */}
                            <div className="w-full md:w-1/3 flex flex-col justify-center gap-8 md:gap-12 mb-8 md:mb-0">
                                <div>
                                    <h2 className="text-3xl md:text-5xl font-bold text-white mb-2 leading-tight">
                                        Método <br/> <span className="text-gray-500">passo a passo</span>
                                    </h2>
                                    <p className="text-sm font-mono tracking-widest text-gray-400 mt-4 uppercase">Cronograma de 30 Dias</p>
                                </div>

                                {/* Barra de progresso visual */}
                                <div className="relative flex flex-row md:flex-col justify-between items-center md:items-start w-full md:h-[40vh]">
                                    {/* Linha de fundo (cinza) */}
                                    <div className="absolute top-1/2 md:top-0 left-0 md:left-[11px] w-full md:w-[2px] h-[2px] md:h-full bg-white/10 -translate-y-1/2 md:translate-y-0" />
                                    
                                    {/* Linha colorida de preenchimento */}
                                    <div 
                                        className="absolute top-1/2 md:top-0 left-0 md:left-[11px] w-full md:w-[2px] h-[2px] md:h-full origin-left md:origin-top transition-transform duration-100 ease-out z-10"
                                        style={{ 
                                            backgroundColor: '#fff', 
                                            transform: `scale${window.innerWidth < 768 ? 'X' : 'Y'}(${progress}) translateZ(0)`,
                                            willChange: 'transform'
                                        }}
                                    />

                                    {/* Pontos nodais */}
                                    {steps.map((step, idx) => {
                                        const isPast = activeIndex > idx;
                                        const isActive = activeIndex === idx;
                                        
                                        return (
                                            <div key={idx} className="relative z-20 flex items-center gap-4">
                                                <div 
                                                    className={`w-6 h-6 rounded-full border-[3px] flex items-center justify-center transition-all duration-500
                                                        ${isActive ? `border-transparent ${step.colorClass} ${step.shadowClass} scale-125` : 
                                                          isPast ? 'bg-white border-white scale-75' : 
                                                          'bg-[#0a0a0a] border-white/20 scale-75'}
                                                    `}
                                                >
                                                    {isPast && <div className="w-2 h-2 bg-black rounded-full" />}
                                                </div>
                                                <span className={`hidden md:block font-bold text-sm tracking-wider uppercase transition-colors duration-500 
                                                    ${isActive ? 'text-white' : 'text-gray-600'}`}>
                                                    S{idx + 1}
                                                </span>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>

                            {/* Direita: Content Cards animados (Sem perspective pesada) */}
                            <div className="w-full md:w-2/3 relative h-[50vh] md:h-[60vh] flex items-center">
                                {steps.map((step, idx) => {
                                    const isActive = activeIndex === idx;
                                    const isPast = activeIndex > idx;
                                    const isFuture = activeIndex < idx;
                                    
                                    // Cálculos de classe para animação mais suave e leve
                                    let transformClass = "";
                                    let opacityClass = "opacity-0";
                                    
                                    if (isActive) {
                                        transformClass = "translate-y-0 scale-100 z-20";
                                        opacityClass = "opacity-100";
                                    } else if (isPast) {
                                        transformClass = "-translate-y-8 scale-[0.98] opacity-0 z-10 pointer-events-none";
                                        opacityClass = "opacity-0";
                                    } else if (isFuture) {
                                        transformClass = "translate-y-8 scale-[0.98] opacity-0 z-10 pointer-events-none";
                                        opacityClass = "opacity-0";
                                    }

                                    return (
                                        <div 
                                            key={idx}
                                            className={`absolute w-full p-8 md:p-12 rounded-3xl timeline-glass transition-all duration-500 ease-out ${transformClass} ${opacityClass}`}
                                            style={{ willChange: 'transform, opacity' }}
                                        >
                                            <div className="flex items-center gap-4 mb-6">
                                                <div className={`w-12 h-1 rounded-full ${step.colorClass}`}></div>
                                                <h3 className={`font-mono tracking-widest text-sm uppercase ${step.textClass} font-bold`}>
                                                    {step.week}
                                                </h3>
                                            </div>
                                            
                                            <h4 className="text-3xl md:text-5xl font-bold text-white mb-8 leading-tight">
                                                {step.title}
                                            </h4>
                                            
                                            <div className="space-y-6 text-gray-400 text-lg md:text-xl leading-relaxed">
                                                <p>{step.desc1}</p>
                                                <p className="text-gray-300">{step.desc2}</p>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>

                        </div>
                    </div>
                </section>
            );
        };

        // --- Componente Principal ---
        function App() {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleApplyClick = () => {
                window.location.href = "https://pay.kiwify.com.br/1CpdMXG";
            };

            const deliverables = [
                { title: "Diagnóstico do perfil", desc: "O que está travando a percepção de valor. Não é auditoria estética - é mapeamento de gargalo." },
                { title: "Big idea e promessa central da marca", desc: "A mensagem-raiz que orienta tudo: bio, conteúdo, destaques, qualquer ponto de contato com o mercado." },
                { title: "Bio, destaques e fixados", desc: "O trio que qualifica o lead antes de qualquer conversa. Quando funciona, o direct muda de qualidade." },
                { title: "Direção de conteúdo com roteiros prontos", desc: "Não é lista de temas. São roteiros que posicionam, educam e empurram para decisão." },
                { title: "Organização do direct", desc: "Triagem e follow-up. Estrutura para transformar conversa em cliente - sem improviso." },
                { title: "Dashboard de acompanhamento", desc: "Dado vira decisão, não ansiedade." },
                { title: "Agente de IA exclusivo da sua marca", desc: "IA treinada com a lógica, a voz e o posicionamento da sua marca — que cria conteúdo por você depois que a base estiver instalada. Por R$50/mês, o sistema continua rodando sem você precisar de ninguém." }
            ];

            return (
                <div className="bg-[#050505] min-h-screen text-gray-300 selection:bg-blue-500/30 selection:text-white" style={{ overflowX: 'clip' }}>
                    
                    {/* Navbar */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-[#050505]/90 backdrop-blur-md border-b border-white/10 py-4' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 md:px-12 max-w-7xl flex justify-between items-center">
                            <div className="text-xl font-bold text-white tracking-tighter uppercase border-l-2 border-blue-500 pl-3">
                                Ian Henrique
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative min-h-screen flex items-center pt-20 overflow-hidden">
                        <div className="absolute inset-0 bg-grid z-0"></div>
                        <div className="absolute inset-0 bg-gradient-to-b from-transparent via-[#050505]/80 to-[#050505] z-0"></div>
                        <div className="scan-beam z-0"></div>

                        <div className="container mx-auto px-6 relative z-10">
                            <div className="max-w-4xl mx-auto text-center flex flex-col items-center">
                                <RevealOnScroll>
                                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-bold uppercase tracking-widest mb-6">
                                        <span className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                                        P30D
                                    </div>
                                </RevealOnScroll>
                                
                                <RevealOnScroll delay={0.1}>
                                    <h1 className="text-5xl md:text-7xl font-bold text-white mb-6 leading-tight tracking-tight glow-text max-w-4xl mx-auto">
                                        Transforme seu Instagram em uma máquina de atração de clientes.
                                    </h1>
                                </RevealOnScroll>

                                <RevealOnScroll delay={0.2}>
                                    <p className="text-xl text-gray-400 mb-10 max-w-2xl mx-auto leading-relaxed">
                                        Eu entrego seu perfil completamente estruturado - com posicionamento, bio, destaques, posts fixados, roteiros e um agente treinado para criar suas copys - para que seu Instagram trabalhe atraindo clientes toda semana, por menos de R$300/mês.
                                    </p>
                                </RevealOnScroll>

                                <RevealOnScroll delay={0.3}>
                                    <Button onClick={handleApplyClick} className="flex items-center justify-center">
                                        Quero atrair mais clientes
                                    </Button>
                                </RevealOnScroll>
                            </div>
                        </div>
                        
                        <div className="absolute bottom-10 left-1/2 transform -translate-x-1/2 animate-bounce text-gray-500">
                            <Icons.ChevronDown size={48} className="opacity-80" />
                        </div>
                    </section>

                    {/* O Problema */}
                    <section className="py-24 relative bg-[#0a0a0a]">
                        <div className="container mx-auto px-6 md:px-20 max-w-4xl">
                            <RevealOnScroll>
                                <h2 className="text-3xl md:text-4xl font-bold text-white mb-8 text-center leading-tight">
                                    Você não tem um problema de "conteúdo". <br/><br/>
                                    <span className="text-blue-500">Você tem um problema de estrutura.</span>
                                </h2>
                                
                                <div className="space-y-6 text-lg text-gray-400 leading-relaxed text-center">
                                    <p>
                                        Se o seu Instagram não deixa óbvio, em segundos: <strong>o que você faz, pra quem você faz, por que você é a escolha certa e como começar...</strong> o cliente bom entra, olha e vai embora.
                                    </p>
                                    <p>
                                        Sem te avisar. Sem te dar chance. E aí você fica tentando compensar com mais post. Mais esforço. Mais dica. Mais "constância".
                                    </p>
                                    <p>
                                        Só que constância sem direção só aumenta o volume de gente errada. E mantém o seu Instagram no mesmo lugar: <span className="text-gray-300 italic">presença digital</span>.
                                    </p>
                                    <p className="text-white font-semibold text-xl pt-4">
                                        O Plano 30 Dias existe para mudar isso rápido.<br/><br/>
                                        <span className="text-blue-400">Não com teoria. Com instalação real de uma estrutura que faz o seu perfil trabalhar para você.</span>
                                    </p>
                                </div>
                            </RevealOnScroll>
                        </div>
                    </section>

                    {/* O que é vs O que não é */}
                    <section className="py-20 relative bg-[#050505]">
                        <div className="container mx-auto px-6 md:px-20 max-w-6xl">
                            <div className="grid md:grid-cols-2 gap-8 items-stretch">
                                <RevealOnScroll delay={0.1} className="h-full flex flex-col">
                                    <div className="flex-1 bg-[#0a0a0a] border border-red-900/30 rounded-2xl p-8 hover:border-red-900/50 transition-colors duration-300">
                                        <div className="inline-block px-3 py-1 bg-red-500/10 text-red-500 font-bold text-xs uppercase tracking-widest rounded mb-6">
                                            O que NÃO é
